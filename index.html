<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="src/img/logo.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/src/style.css">
  <title>KitchenOS</title>
  <style>
      body {
    background: linear-gradient(135deg, #0a0a0a, #1a1a1a, #0a0a0a);
    min-height: 100vh;
  }

  .borda-dourada {
    background: #111;
    border: 1px solid #d4af37;
    border-radius: 24px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
    border-top: 4px solid #d4af37;
  }
  .btn-gold {
    background: #000;
    color: #d4af37;
    border: 2px solid #d4af37;
    font-weight: 700;
    border-radius: 50px;
    padding: 14px 48px;

  }
  .btn-gold:hover {
    background: #d4af37;
    color: #000;
    transform: scale(1.06);
    transition: 0.3s;
  }

</head>
<body>

<main class="hero d-flex align-items-center text-center"
      style="background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
            url('/src/img/restaurante.png') no-repeat center /cover;
            min-height: 100vh;">
  <div class="container">
    <div class="borda-dourada p-5 text-white" style="max-width: 500px; margin: 0 auto;">
      <h1 class="display-4 fw-bold" style="color: #d4af37;">KitchenOS</h1>
      <p class="lead mb-4">Sistema de controle de pedidos</p>
      <a class="btn btn-gold" href="cardapio.html">Abrir Sistema</a>

  <script src="/src/main.js"></script>
