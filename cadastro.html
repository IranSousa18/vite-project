<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href=".src/img/logo.png">
  <title>Cadastro | KitchenOS</title>
</head>
<body>

  <main class="login-page d-flex align-items-center justify-content-center min-vh-100">
    <div class="login-card text-white p-5">
        <h1 class="text-center mb-2">KitchenOS</h1>
      <p class="text-center mb-4">Crie sua conta</p>

    <form id="formCadastro">
      <div class="mb-3">
        <label for="emailLogin" class="form-label">Nome</label>
        <input type="text" class="form-control" id="nomeCadastro" placeholder="Digite um nome" required>
      </div>

      <div class="mb-3">
        <label for="senhaLogin" class="form-label">Email</label>
        <input type="email" class="form-control" id="emailCadastro" placeholder="Digite seu email" required>
      </div>

      <button type="submit" class="btn btn-gold w-100 mt-3">Realizar cadastro</button>
    </form>

      <p class="text-center mt-4 mb-0">
        Ja possui conta?
        <a href="login.html"> Faça Login</a>
      </p>
    </div>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
