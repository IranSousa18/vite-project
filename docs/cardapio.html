<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/vite-project/assets/logo-Dv7nL_Fb.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <title>Cardápio | KitchenOS</title>
  <script type="module" crossorigin src="/vite-project/assets/main-BZhvOn6R.js"></script>
  <link rel="stylesheet" crossorigin href="/vite-project/assets/main-DEvRvTkD.css">
</head>
<body>

  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">KitchenOS</a>
    </div>
  </nav>

  <main class="container mt-5">
    <h1 class="text-center mt-5">Cardápio</h1>

    <div class="row" id="listaProdutos">
      <!-- Área dos produtos -->
    </div>

    <hr class="my-5">

    <section>
      <h2>Carrinho</h2>

      <div class="mb-3" id="listaCarrinho">
        <p class="text-muted">Nenhum item adicionado</p>
      </div>

      <h3 id="totalPedido">Total: R$ 0</h3>

      <hr>

      <div class="mb-3">
        <label for="tipoPedido" class="form-label">Tipo do pedido</label>
        <select id="tipoPedido" class="form-select">
          <option value="">Selecione</option>
          <option value="Mesa">Mesa</option>
          <option value="Balcão">Balcão</option>
        </select>
      </div>

      <div class="mb-3">
        <label for="numeroPedido" class="form-label">Número</label>
        <input 
          type="number" 
          id="numeroPedido" 
          class="form-control" 
          placeholder="Ex: 01"
        >
      </div>

      <div class="mb-3">
        <label for="formaPagamento" class="form-label">Forma de pagamento</label>
        <select id="formaPagamento" class="form-select">
          <option value="">Selecione</option>
          <option value="Dinheiro">Dinheiro</option>
          <option value="PIX">PIX</option>
          <option value="Cartão de Crédito">Cartão de Crédito</option>
          <option value="Cartão de Débito">Cartão de Débito</option>
        </select>
      </div>

      <div class="mb-3">
        <label for="formaEntrega" class="form-label">Forma de entrega</label>
        <select id="formaEntrega" class="form-select">
          <option value="">Selecione</option>
          <option value="Retirada">Retirada</option>
          <option value="Consumo no local">Consumo no local</option>
          <option value="Aplicativo de entrega">Aplicativo de entrega</option>
        </select>
      </div>

      <button class="btn btn-success mt-3" id="btnFinalizarPedido">
        Finalizar pedido
      </button>
    </section>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</body>
</html>
