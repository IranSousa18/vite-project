<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href=".src/img/logo.png">
  <title>Login | KitchenOS</title>
  <script type="module" crossorigin src="/vite-project/assets/main-BZhvOn6R.js"></script>
  <link rel="stylesheet" crossorigin href="/vite-project/assets/main-DEvRvTkD.css">
</head>
<body>

  <main class="login-page d-flex align-items-center justify-content-center min-vh-100">
    <div class="login-card text-white p-5">
      <h1 class="text-center mb-2">KitchenOS</h1>
      <p class="text-center mb-4">Acesse o sistema</p>

      <form id="formLogin">
        <div class="mb-3">
          <label for="emailLogin" class="form-label">Email</label>
          <input type="email" class="form-control" id="emailLogin" required>
        </div>

        <div class="mb-3">
          <label for="senhaLogin" class="form-label">Senha</label>
          <input type="password" class="form-control" id="senhaLogin" required>
        </div>

        <button type="submit" class="btn btn-gold w-100 mt-3">Entrar</button>
      </form>

      <p class="text-center mt-4 mb-0">
        Não tem conta?
        <a href="cadastro.html">Cadastre-se</a>
      </p>
    </div>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</body>
</html>
